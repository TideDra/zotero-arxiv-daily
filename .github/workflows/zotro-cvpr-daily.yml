name: zotro-cvpr-daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.REF }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Run conference recommendation script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          cat > config/custom.yaml <<'EOF'
          zotero:
            user_id: ${oc.env:ZOTERO_ID}
            api_key: ${oc.env:ZOTERO_KEY}
            include_path: null

          email:
            sender: ${oc.env:SENDER}
            receiver: ${oc.env:RECEIVER}
            smtp_server: smtp.qq.com
            smtp_port: 465
            sender_password: ${oc.env:SENDER_PASSWORD}

          llm:
            api:
              key: ${oc.env:OPENAI_API_KEY}
              base_url: ${oc.env:OPENAI_API_BASE}
            generation_kwargs:
              model: gpt-4o-mini

          source:
            conference:
              venues: ["cvpr", "eccv", "iclr", "nips", "aaai", "icml"]
              year: 2026

          executor:
            debug: ${oc.env:DEBUG,false}
            source: ["conference"]
            max_paper_num: 20
          EOF
          if [ -n "$CUSTOM_CONFIG" ]; then
            printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml
          fi
          echo "Use custom config: "
          cat config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py
