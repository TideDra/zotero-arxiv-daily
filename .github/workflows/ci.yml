name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025  # SMTP
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4

      - name: Start mock OpenAI server
        run: |
          pip install fastapi uvicorn
          python tests/utils/mock_openai/openai_server.py &
          timeout 10 bash -c 'until curl -sf http://localhost:30000/v1/chat/completions -X POST -H "Content-Type: application/json" -d "{}" 2>/dev/null; do sleep 1; done' || true

      - name: Run Pytest
        env:
          ZOTERO_ID: "0"
          ZOTERO_KEY: "AbCdEfGhIjKlMnOpQrStUvWx"
          SENDER: "test@example.com"
          RECEIVER: "test@example.com"
          SENDER_PASSWORD: "test"
          OPENAI_API_KEY: "sk-xxx"
          OPENAI_API_BASE: "http://localhost:30000/v1"
        run: |
          uv run pytest